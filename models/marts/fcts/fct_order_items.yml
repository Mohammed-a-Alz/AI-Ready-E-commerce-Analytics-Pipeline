version: 2

models:
  - name: fct_order_items
    description: "One row per item in an order — item-level revenue."
    columns:
      - name: order_id
        data_tests:
          - not_null
      - name: product_id
        data_tests:
          - not_null
      - name: seller_id
        data_tests:
          - not_null
      - name: purchased_at
        description: "Timestamp when the order was placed"

semantic_models:
  - name: order_items
    description: "Order item grain fact table."
    defaults:
      agg_time_dimension: purchased_at
    model: ref('fct_order_items')
    entities:
      - name: order_item
        type: primary
        expr: order_item_id
      - name: order
        type: foreign
        expr: order_id
      - name: product
        type: foreign
        expr: product_id
      - name: seller
        type: foreign
        expr: seller_id
    dimensions:
      - name: purchased_at
        type: time
        type_params:
          time_granularity: day
    measures:
      - name: total_items_sold
        description: "Total number of items sold"
        agg: count_distinct
        expr: order_item_id
      - name: item_revenue
        description: "Revenue from item prices"
        agg: sum
        expr: price
      - name: gross_revenue
        description: "Total value including freight"
        agg: sum
        expr: total_item_value

metrics:
  - name: total_items_sold
    label: Total Items Sold
    description: "Total number of items sold"
    type: simple
    type_params:
      measure: total_items_sold
  - name: item_revenue
    label: Item Revenue
    description: "Revenue from item prices excluding freight"
    type: simple
    type_params:
      measure: item_revenue
  - name: gross_revenue
    label: Gross Revenue
    description: "Total item value including freight"
    type: simple
    type_params:
      measure: gross_revenue